name: EigenTrades CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q

      - name: Phase 6 benchmark gate
        env:
          PHASE6_MIN_ENSEMBLE_ACCURACY: "0.55"
          PHASE6_MAX_LLM_LATENCY_MS: "2000"
        run: python scripts/phase6_benchmark.py
